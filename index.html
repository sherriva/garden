document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:100%;background:#eae8e3;border-radius:16px;overflow:hidden;box-shadow:0 6px 22px -12px rgba(40,38,60,.32);transition:transform .22s ease,box-shadow .22s ease\" style-hover=\"position:relative;aspect-ratio:1/1;width:100%;background:#eae8e3;border-radius:16px;overflow:hidden;box-shadow:0 18px 38px -14px rgba(40,38,60,.45);transform:translateY(-6px);transition:transform .22s ease,box-shadow .22s ease\">\n                    <x-import component-from-global-scope=\"image-slot\" from=\"3ecec881-10a4-4ccc-91fa-c6ec1b1199d6#/image-slot.js\" id=\"{{ card.slotId }}\" src=\"{{ card.src }}\" shape=\"rect\" fit=\"cover\" placeholder=\"Add image\" hint-size=\"100%,100%\"><\u002Fx-import>\n                    <div sc-camel-on-click=\"{{ card.onView }}\" title=\"Open gallery\" style=\"position:absolute;inset:0;z-index:4;cursor:pointer\"><\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n\n              <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n                <button sc-camel-on-click=\"{{ sec.onAddCard }}\" style=\"aspect-ratio:1/1;margin-top:52px;border:1.5px dashed #cfccdd;background:rgba(255,255,255,.5);border-radius:16px;color:#9a97b0;cursor:pointer;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px\" style-hover=\"aspect-ratio:1/1;margin-top:52px;border:1.5px dashed #5a4f8a;background:#fff;border-radius:16px;color:#5a4f8a;cursor:pointer;font-size:13px;font-weight:500;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px\"><span style=\"font-size:24px\">+<\u002Fspan>Add plant<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n\n            <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n              <button sc-camel-on-click=\"{{ sec.onDelete }}\" style=\"margin-top:16px;font-size:11.5px;color:#bbb;background:none;border:none;cursor:pointer\">Remove section<\u002Fbutton>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n\n        <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <button sc-camel-on-click=\"{{ month.onAddSection }}\" style=\"margin-top:30px;font-size:13px;font-weight:500;color:#5a4f8a;background:#fff;border:1px solid rgba(90,79,138,.2);border-radius:22px;padding:8px 18px;cursor:pointer\">+ Add planting period<\u002Fbutton>\n        <\u002Fsc-if>\n      <\u002Fsection>\n    <\u002Fsc-for>\n\n    <sc-if value=\"{{ editMode }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"margin-top:70px;padding-top:28px;border-top:1px solid rgba(0,0,0,.08);display:flex;gap:14px;align-items:center\">\n        <button sc-camel-on-click=\"{{ onReset }}\" style=\"font-size:12.5px;color:#c25b5b;background:none;border:1px solid #e8cfcf;border-radius:22px;padding:8px 18px;cursor:pointer\">Reset catalog to original<\u002Fbutton>\n        <span style=\"font-size:12px;color:#a8a5b2\">Edits and photos save automatically in this browser.<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ viewerOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div sc-camel-on-click=\"{{ onCloseViewer }}\" sc-camel-on-touch-start=\"{{ onTouchStart }}\" sc-camel-on-touch-end=\"{{ onSwipeEnd }}\" style=\"position:fixed;inset:0;z-index:90;background:#0c0b11;overflow:hidden\">\n      <div sc-camel-on-click=\"{{ stop }}\" style=\"position:absolute;inset:0\">\n        <x-import component-from-global-scope=\"image-slot\" from=\"3ecec881-10a4-4ccc-91fa-c6ec1b1199d6#/image-slot.js\" id=\"{{ viewer.slotId }}\" src=\"{{ viewer.src }}\" shape=\"rect\" fit=\"cover\" placeholder=\"Drop a photo for this plant\" hint-size=\"100%,100%\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"position:absolute;top:0;left:0;right:0;height:130px;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,0));pointer-events:none\"><\u002Fdiv>\n      <div style=\"position:absolute;bottom:0;left:0;right:0;height:210px;background:linear-gradient(rgba(0,0,0,0),rgba(0,0,0,.78));pointer-events:none\"><\u002Fdiv>\n      <div class=\"season\" style=\"position:absolute;top:22px;left:22px;right:74px;color:#eceaf2;font-size:12px;letter-spacing:.14em;text-transform:uppercase;pointer-events:none\">{{ viewer.monthLabel }} · {{ viewer.sectionLabel }}<\u002Fdiv>\n      <button sc-camel-on-click=\"{{ onCloseViewer }}\" style=\"position:absolute;top:16px;right:16px;width:42px;height:42px;border-radius:50%;border:none;background:rgba(0,0,0,.42);color:#fff;font-size:22px;cursor:pointer;backdrop-filter:blur(6px);z-index:3\">×<\u002Fbutton>\n      <div style=\"position:absolute;bottom:28px;left:0;right:0;text-align:center;color:#fff;pointer-events:none;padding:0 24px\">\n        <div class=\"season\" style=\"font-size:22px;font-weight:600;text-wrap:pretty\">{{ viewer.name }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:840},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#5a4f8a&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Style&quot;},&quot;columns&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:5,&quot;min&quot;:3,&quot;max&quot;:6,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Layout&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    const saved = this._load();\n    this.state = {\n      months: saved || this._seed(),\n      editMode: false,\n      query: \"\",\n      viewerIndex: null,\n      activeMonth: null\n    };\n  }\n\n  _key(){ return \"balcony-garden-catalog-v2\"; }\n  _load(){ try{ const r=localStorage.getItem(this._key()); if(!r) return null; const m=JSON.parse(r); m.forEach(mo=>mo.sections.forEach(s=>{ s.cards=s.cards.filter(c=>c.name!==\"Romaine – Cimmaron\"); })); return m; }catch(e){ return null; } }\n  _save(months){ try{ localStorage.setItem(this._key(), JSON.stringify(months)); }catch(e){} }\n  _gid(){ return \"c-\"+Date.now().toString(36)+\"-\"+Math.random().toString(36).slice(2,6); }\n  _slug(name){ return \"p-\"+String(name||\"\").toLowerCase().replace(/[’']/g,\"\").replace(/[^a-z0-9]+/g,\"-\").replace(/^-|-$/g,\"\"); }\n\n  _seed(){\n    let n=0; const id=()=>\"c\"+(n++);\n    const S=(heading,names,extra)=>Object.assign({id:id(),heading,tag:\"\",note:\"\",process:\"\",cards:names.map(name=>({id:id(),name}))},extra||{});\n    return [\n      {key:\"jul\",title:\"July 2026\",eyebrow:\"Midsummer · Seedlings\",sections:[\n        S(\"Seedlings — Solo Cups\",[\"Burpee Zinnias Zesty Mix\",\"Burpee Sunray Yellow Sunflower\",\"Marigold – African Kilimanjaro White\",\"Celosia – King Coral\",\"Lettuce – Little Gem\",\"Arugula – Garden Tangy\"]),\n        S(\"Seedlings — Seed Trays\",[\"Gomphrena – Fireworks\",\"Craspedia – Drumstick Flower\"]),\n        S(\"Last Week of July\",[\"Marigold – Petite orange\",\"Benary’s Giant Salmon Rose Zinnia\",\"Benary’s Giant Wine Rose Zinnia\",\"Oklahoma Pink Zinnia\",\"Shimmer Organic Celosia\"])\n      ]},\n      {key:\"aug\",title:\"August 2026\",eyebrow:\"Late summer · Herbs & edibles\",sections:[\n        S(\"Early August\",[\"Kitchen Mini Cucumber\",\"Everglades Tomato\",\"Genovese basil\",\"Parsley\",\"Thyme\"]),\n        S(\"Late August\",[\"Cilantro\",\"Dill\",\"Oregano\",\"Sage\",\"Lavender\"])\n      ]},\n      {key:\"sep\",title:\"September 2026\",eyebrow:\"Early autumn · Transition\",sections:[\n        S(\"Early September — Start Indoors\",[\"Snapdragon – Twinny Appleblossom\",\"Everglades Tomato\",\"Kitchen Mini Cucumber\"]),\n        S(\"Mid September — Optional Warm-Season Succession\",[\"Zinnia – Oklahoma Pink\",\"Celosia – Shimmer\",\"Gomphrena – Fireworks\"],{tag:\"Optional — plant only if space allows\"}),\n        S(\"Late September — Cool-Season Edibles\",[\"Lettuce – Little Gem\",\"Romaine – Parris Island Cos\",\"Arugula – Garden Tangy\"]),\n        S(\"Late September — Arriving Plants and Corms\",[\"Blueberry – Sunshine Blue\",\"Blueberry – Sunshine Blue\",\"Ranunculus – Marshmallow\"],{note:\"Corms arrive in September; store until planting conditions are cooler.\"})\n      ]},\n      {key:\"oct\",title:\"October 2026\",eyebrow:\"Autumn · Cool-season\",sections:[\n        S(\"Early October — Start Indoors\",[\"Sweet Alyssum – Snow Cloth\"]),\n        S(\"October — Cool-Season Edible Succession\",[\"Lettuce – Little Gem\",\"Romaine – Parris Island Cos\",\"Arugula – Garden Tangy\"],{tag:\"Sow only as needed\"}),\n        S(\"Mid to Late October — Harden Off and Move Outside\",[\"Snapdragon – Twinny Appleblossom\",\"Sweet Alyssum – Snow Cloth\",\"Parsley\",\"Cilantro\",\"Dill\",\"Lettuce – Little Gem\",\"Romaine\",\"Arugula\"]),\n        S(\"Late October — Prepare for November Planting\",[\"Larkspur – QIS Carmine\",\"Ranunculus – Romance Salerno\",\"Ranunculus – Marshmallow\"],{tag:\"Prepare containers and chill or store planting material\"})\n      ]},\n      {key:\"nov\",title:\"November 2026\",eyebrow:\"Late autumn · Planting out\",sections:[\n        S(\"Early November — Direct Sow\",[\"Larkspur – QIS Carmine\"]),\n        S(\"Early November — Pre-Sprout Corms\",[\"Ranunculus – Marshmallow\",\"Ranunculus – Romance Salerno\"],{process:\"Soak → pre-sprout → plant\"}),\n        S(\"Mid November — Plant Outside\",[\"Ranunculus – Marshmallow\",\"Ranunculus – Romance Salerno\",\"Snapdragon – Twinny Appleblossom\",\"Sweet Alyssum – Snow Cloth\",\"Parsley\",\"Cilantro\",\"Dill\"]),\n        S(\"Late November — Direct Sow Edibles\",[\"Rainbow Carrots\",\"Lettuce – Little Gem\",\"Romaine – Parris Island Cos\",\"Arugula – Garden Tangy\"],{tag:\"Plant based on available space and current harvests\"})\n      ]},\n      {key:\"dec\",title:\"December 2026\",eyebrow:\"Winter · Cool-season garden\",sections:[\n        S(\"Cool-Season Garden\",[\"Snapdragon – Twinny Appleblossom\",\"Sweet Alyssum – Snow Cloth\",\"Larkspur – QIS Carmine\",\"Ranunculus – Marshmallow\",\"Ranunculus – Romance Salerno\",\"Lettuce – Little Gem\",\"Romaine – Parris Island Cos\",\"Arugula – Garden Tangy\",\"Rainbow Carrots\",\"Parsley\",\"Cilantro\",\"Dill\",\"Blueberry – Sunshine Blue\"],{note:\"Represents what should currently be growing — not necessarily what to newly plant.\"}),\n        S(\"Optional December Succession\",[\"Lettuce – Little Gem\",\"Romaine\",\"Arugula – Garden Tangy\",\"Sweet Alyssum – Snow Cloth\"],{tag:\"Optional — sow only if needed\"})\n      ]}\n    ];\n  }\n\n  _commit(months){ this._save(months); this.setState({months}); }\n  _mapMonths(fn){ return this.state.months.map(fn); }\n\n  componentDidMount(){\n    this._onKey=(e)=>{\n      if(this.state.viewerIndex==null) return;\n      if(e.key===\"Escape\") this.setState({viewerIndex:null});\n      else if(e.key===\"ArrowRight\") this._step(1);\n      else if(e.key===\"ArrowLeft\") this._step(-1);\n    };\n    window.addEventListener(\"keydown\",this._onKey);\n    this._onScroll=()=>{\n      if(this._raf) return;\n      this._raf=requestAnimationFrame(()=>{\n        this._raf=0;\n        let act=this.state.months[0] && this.state.months[0].key;\n        for(const m of this.state.months){ const el=document.getElementById(\"m-\"+m.key); if(el && el.getBoundingClientRect().top<=150) act=m.key; }\n        if(act!==this.state.activeMonth) this.setState({activeMonth:act});\n      });\n    };\n    window.addEventListener(\"scroll\",this._onScroll,{passive:true});\n    this._onScroll();\n  }\n  componentWillUnmount(){ window.removeEventListener(\"keydown\",this._onKey); window.removeEventListener(\"scroll\",this._onScroll); }\n\n  _flat(){\n    const out=[];\n    this.state.months.forEach(m=>m.sections.forEach(s=>s.cards.forEach(c=>{\n      out.push({cid:c.id,slotId:this._slug(c.name),name:c.name,monthLabel:m.title,sectionLabel:s.heading});\n    })));\n    return out;\n  }\n  _step(d){\n    const total=this._flat().length; if(!total) return;\n    this.setState(st=>({viewerIndex:(st.viewerIndex+d+total)%total}));\n  }\n\n  _updCard(mk,sid,cid,val){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.map(s=>s.id!==sid?s:Object.assign({},s,{cards:s.cards.map(c=>c.id!==cid?c:Object.assign({},c,val))}))}))); }\n  _delCard(mk,sid,cid){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.map(s=>s.id!==sid?s:Object.assign({},s,{cards:s.cards.filter(c=>c.id!==cid)}))}))); }\n  _addCard(mk,sid){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.map(s=>s.id!==sid?s:Object.assign({},s,{cards:s.cards.concat([{id:this._gid(),name:\"New plant\"}])}))}))); }\n  _updSec(mk,sid,val){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.map(s=>s.id!==sid?s:Object.assign({},s,val))}))); }\n  _delSec(mk,sid){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.filter(s=>s.id!==sid)}))); }\n  _addSec(mk){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,{sections:m.sections.concat([{id:this._gid(),heading:\"New planting period\",tag:\"\",note:\"\",process:\"\",cards:[]}])}))); }\n  _updMonth(mk,val){ this._commit(this._mapMonths(m=>m.key!==mk?m:Object.assign({},m,val))); }\n\n  _photo(name){\n    const map={\n      \"Kitchen Mini Cucumber\":\"assets/509249073795a818.png\",\n      \"Everglades Tomato\":\"assets/344a51db416921ff.png\",\n      \"Parsley\":\"assets/07348f11d7760305.png\",\n      \"Cilantro\":\"assets/3c3c0189b5139027.png\",\n      \"Dill\":\"assets/bbc634aae0f9f67d.png\",\n      \"Genovese basil\":\"assets/2ac597af388a4f92.png\",\n      \"Thyme\":\"assets/35a4996f9ca780eb.png\",\n      \"Oregano\":\"assets/c5088a7e8289b09e.png\",\n      \"Sage\":\"assets/2f661d97dbc1a942.png\",\n      \"Lavender\":\"assets/3e22b3ce00ceddfd.png\",\n      \"Lettuce – Little Gem\":\"assets/6ae31be5762607f8.png\",\n      \"Romaine – Parris Island Cos\":\"assets/romaine.png\",\n      \"Romaine\":\"assets/romaine.png\",\n      \"Gomphrena – Fireworks\":\"assets/38bd636f17f80255.png\",\n      \"Arugula – Garden Tangy\":\"assets/ph-arugula-garden-tangy.webp\",\n      \"Arugula\":\"assets/ph-arugula-garden-tangy.webp\",\n      \"Zinnia – Oklahoma Pink\":\"assets/90639f4e81625b94.png\",\n      \"Oklahoma Pink Zinnia\":\"assets/90639f4e81625b94.png\",\n      \"Celosia – Shimmer\":\"assets/1b4736e647720dcf.png\",\n      \"Shimmer Organic Celosia\":\"assets/1b4736e647720dcf.png\",\n      \"Burpee Zinnias Zesty Mix\":\"assets/ph-burpee-zinnias-zesty-mix.webp\",\n      \"Burpee Sunray Yellow Sunflower\":\"assets/78f24d4ff032a9ba.png\",\n      \"Marigold – African Kilimanjaro White\":\"assets/088beb96018c1fbb.png\",\n      \"Celosia – King Coral\":\"assets/f355bfad41f106d9.png\",\n      \"Craspedia – Drumstick Flower\":\"assets/ph-craspedia-drumstick-flower.png\",\n      \"Marigold – Petite orange\":\"assets/431e40ca62990eb5.png\",\n      \"Benary’s Giant Salmon Rose Zinnia\":\"assets/5cbb21ddb52c93f1.png\",\n      \"Benary’s Giant Wine Rose Zinnia\":\"assets/b50fe9ac5cde6ea9.png\",\n      \"Snapdragon – Twinny Appleblossom\":\"assets/ph-snapdragon-twinny-appleblossom.webp\",\n      \"Blueberry – Sunshine Blue\":\"assets/ph-blueberry-sunshine-blue.webp\",\n      \"Ranunculus – Marshmallow\":\"assets/ph-ranunculus-marshmallow.webp\",\n      \"Ranunculus – Romance Salerno\":\"assets/ranunculus-romance-salerno.png\",\n      \"Larkspur – QIS Carmine\":\"assets/larkspur-qis-carmine.png\",\n      \"Rainbow Carrots\":\"assets/rainbow-carrots.png\",\n      \"Sweet Alyssum – Snow Cloth\":\"assets/ph-sweet-alyssum-snow-cloth.webp\"\n    };\n    return map[name]||\"\";\n  }\n\n  renderVals(){\n    const accent=this.props.accent ?? \"#5a4f8a\";\n    const cols=this.props.columns ?? 5;\n    const edit=this.state.editMode;\n    const q=this.state.query.trim().toLowerCase();\n    const flat=this._flat();\n    const active=this.state.activeMonth;\n\n    const navMonths=this.state.months.map(m=>{\n      const count=m.sections.reduce((a,s)=>a+s.cards.length,0);\n      const on=m.key===active;\n      return {\n        label:m.title.replace(\" 2026\",\"\"),\n        count,\n        onJump:()=>{ const el=document.getElementById(\"m-\"+m.key); if(el){ const y=el.getBoundingClientRect().top+window.pageYOffset-84; window.scrollTo({top:y,behavior:\"smooth\"}); } },\n        style:\"font-family:inherit;font-size:13.5px;font-weight:\"+(on?\"600\":\"500\")+\";color:\"+(on?accent:\"#514e5e\")+\";background:\"+(on?\"rgba(90,79,138,.11)\":\"transparent\")+\";border:none;border-radius:22px;padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:7px;transition:background .15s,color .15s\",\n        countStyle:\"font-size:10.5px;font-weight:700;color:#fff;background:\"+accent+\";border-radius:20px;padding:1px 7px;min-width:19px;text-align:center;opacity:\"+(on?\"1\":\".78\")\n      };\n    });\n\n    const months=this.state.months.map(m=>{\n      const count=m.sections.reduce((a,s)=>a+s.cards.length,0);\n      return {\n        anchor:\"m-\"+m.key,\n        title:m.title,\n        eyebrow:m.eyebrow||\"\",\n        count,\n        notEdit:!edit,\n        onTitle:(e)=>this._updMonth(m.key,{title:e.target.value}),\n        onAddSection:()=>this._addSec(m.key),\n        sections:m.sections.map(s=>({\n          heading:s.heading,\n          tag:s.tag||\"\",\n          hasTag:!!s.tag,\n          note:s.note||\"\",\n          hasNote:!!s.note,\n          process:s.process||\"\",\n          hasProcess:!!s.process,\n          notEdit:!edit,\n          onHeading:(e)=>this._updSec(m.key,s.id,{heading:e.target.value}),\n          onAddCard:()=>this._addCard(m.key,s.id),\n          onDelete:()=>this._delSec(m.key,s.id),\n          cards:s.cards.map(c=>{\n            const dim = q && c.name.toLowerCase().indexOf(q)===-1;\n            const flatIdx = flat.findIndex(f=>f.cid===c.id);\n            return {\n              slotId:this._slug(c.name),\n              name:c.name,\n              src:this._photo(c.name),\n              notEdit:!edit,\n              wrapStyle:\"display:flex;flex-direction:column;transition:opacity .18s;opacity:\"+(dim?\"0.2\":\"1\"),\n              onName:(e)=>this._updCard(m.key,s.id,c.id,{name:e.target.value}),\n              onDelete:()=>this._delCard(m.key,s.id,c.id),\n              onView:()=>this.setState({viewerIndex: flatIdx<0?0:flatIdx})\n            };\n          })\n        }))\n      };\n    });\n\n    const vi=this.state.viewerIndex;\n    const vopen = vi!=null && flat.length>0;\n    const vcur = vopen ? flat[Math.min(vi,flat.length-1)] : null;\n\n    return {\n      months, navMonths,\n      gridCols:\"repeat(\"+cols+\",minmax(0,1fr))\",\n      colsNum:cols,\n      editMode:edit,\n      editLabel: edit?\"✓ Done\":\"✎ Edit\",\n      editBtnStyle:\"font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:22px;padding:8px 16px;border:1px solid \"+(edit?accent:\"rgba(0,0,0,.1)\")+\";background:\"+(edit?accent:\"rgba(255,255,255,.6)\")+\";color:\"+(edit?\"#fff\":\"#3a3846\"),\n      focusBtnStyle:\"font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border-radius:22px;padding:8px 16px;border:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.6);color:#3a3846\",\n      query:this.state.query,\n      onSearch:(e)=>this.setState({query:e.target.value}),\n      onToggleEdit:()=>this.setState({editMode:!this.state.editMode}),\n      onFocusMode:()=>this.setState({viewerIndex:0}),\n      onReset:()=>{ if(confirm(\"Reset all text back to the original catalog? Your dropped photos are kept.\")){ const s=this._seed(); this._commit(s); } },\n      viewerOpen:vopen,\n      viewer: vcur ? {slotId:vcur.slotId,src:this._photo(vcur.name),name:vcur.name,monthLabel:vcur.monthLabel,sectionLabel:vcur.sectionLabel,pos:(Math.min(vi,flat.length-1)+1)+\" / \"+flat.length} : {slotId:\"\",src:\"\",name:\"\",monthLabel:\"\",sectionLabel:\"\",pos:\"\"},\n      onPrev:(e)=>{ if(e)e.stopPropagation(); this._step(-1); },\n      onNext:(e)=>{ if(e)e.stopPropagation(); this._step(1); },\n      onCloseViewer:()=>this.setState({viewerIndex:null}),\n      stop:(e)=>{ e.stopPropagation(); },\n      onTouchStart:(e)=>{ this._tx = (e.touches && e.touches[0]) ? e.touches[0].clientX : null; },\n      onSwipeEnd:(e)=>{ e.stopPropagation(); if(this._tx==null) return; const t=e.changedTouches && e.changedTouches[0]; if(!t) return; const dx=t.clientX-this._tx; this._tx=null; if(Math.abs(dx)>40) this._step(dx<0?1:-1); }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
